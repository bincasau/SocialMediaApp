{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Settings</title>
    <link href="{% static 'favicon.png' %}" rel="icon" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700;800&family=Bricolage+Grotesque:wght@500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'assets/css/modern-ui.css' %}">
</head>
<body>
    <div class="app-shell">
        <div class="container-wide" style="padding:26px 0;">
            <section class="hero">
                <div class="actions-row" style="justify-content:space-between;">
                    <div>
                        <h1 style="margin:0 0 6px 0;">Account Settings</h1>
                        <p class="muted tiny" style="margin:0;">Update your public profile information.</p>
                    </div>
                    <a href="/" class="btn ghost">Home</a>
                </div>
            </section>

            <section class="card">
                <div class="card-body">
                    <form action="" method="POST" enctype="multipart/form-data" class="stack">
                        {% csrf_token %}

                        <div>
                            <label for="profileimg"><strong>Profile Image</strong></label>
                            <div style="margin:8px 0;">
                                <img src="{{ user_profile.profileimg.url }}" alt="current" class="avatar" style="width:88px;height:88px;">
                            </div>
                            <input id="profileimg" class="file-input" type="file" name="profileimg">
                        </div>

                        <div>
                            <label for="bio"><strong>Bio</strong></label>
                            <textarea id="bio" name="bio" class="text-area" rows="3">{{ user_profile.bio }}</textarea>
                        </div>

                        <div>
                            <label for="location"><strong>Location</strong></label>
                            <input id="location" class="text-input" type="text" name="location" value="{{ user_profile.location }}">
                        </div>

                        <div class="actions-row">
                            <a href="/" class="btn ghost">Cancel</a>
                            <button type="submit" class="btn">Save Changes</button>
                        </div>
                    </form>
                </div>
            </section>
        </div>
    </div>
</body>
</html>
